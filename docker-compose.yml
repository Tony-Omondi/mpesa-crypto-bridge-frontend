version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev           # Use the dev stage

    container_name: nitoken-frontend

    # ── Environment variables ────────────────────────────────────────────────
    # These get picked up by Expo as EXPO_PUBLIC_* vars
    # Copy .env.example to .env and fill in your values
    env_file:
      - .env

    # ── Ports ────────────────────────────────────────────────────────────────
    # Metro bundler
    ports:
      - "8081:8081"
      # Expo dev tools
      - "19000:19000"
      - "19001:19001"

    # ── Volumes ──────────────────────────────────────────────────────────────
    # Mounts your local source code into the container
    # So edits you make locally hot-reload instantly — no rebuild needed
    volumes:
      - .:/app
      # Prevent local node_modules from overwriting container's node_modules
      - /app/node_modules

    # ── Network ──────────────────────────────────────────────────────────────
    networks:
      - nitoken-network

    # ── Keep running on crash ─────────────────────────────────────────────────
    restart: unless-stopped

    # ── Healthcheck ──────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  nitoken-network:
    driver: bridge